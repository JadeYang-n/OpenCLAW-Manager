version: '3.8'

services:
  openclaw-gateway:
    image: registry.cn-hangzhou.aliyuncs.com/openclaw/gateway:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    
    ports:
      - "${WEB_PORT:-18789}:18789"
      - "${WEBHOOK_PORT:-8080}:8080"
    
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    
    environment:
      - OPENCLAW_CONFIG_PATH=/app/config/config.yaml
      - OPENCLAW_LOG_LEVEL=info
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
